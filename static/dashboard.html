<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClearPass AI | Developer Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --card: #151921;
            --border: rgba(255,255,255,0.08);
            --accent: #6c5ce7;
            --green: #00e676;
            --red: #ff5252;
            --text: #e0e0e0;
            --text-dim: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Outfit', sans-serif; 
            padding: 40px;
            line-height: 1.6;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--accent); }
        .badge { background: rgba(108, 92, 231, 0.1); color: var(--accent); padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 600; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; }
        .stat-card small { color: var(--text-dim); text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
        .stat-card h2 { font-size: 32px; margin-top: 10px; }

        .table-container { background: var(--card); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 20px; font-size: 12px; color: var(--text-dim); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 20px; font-size: 14px; border-bottom: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; }
        
        .v-pass { color: var(--green); font-weight: 700; }
        .v-block { color: var(--red); font-weight: 700; }
        .v-review { color: #ffab00; font-weight: 700; }

        .score-pill { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; font-weight: 600; }

        .empty { padding: 100px; text-align: center; color: var(--text-dim); }
        
        button { 
            background: var(--accent); color: white; border: none; padding: 10px 20px; 
            border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        .auto-refresh { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
        .dot { width: 8px; height: 8px; background: var(--green); border-radius: 50%; box-shadow: 0 0 10px var(--green); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">CLEAR<span>PASS</span> <div class="badge">INFRASTRUCTURE</div></div>
        <div class="auto-refresh">
            <div class="dot"></div>
            Live Network Logs
            <button onclick="fetchLogs()" style="margin-left: 20px;">Refresh Now</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <small>Total Verifications</small>
            <h2 id="totalCount">0</h2>
        </div>
        <div class="stat-card">
            <small>Avg. Trust Score</small>
            <h2 id="avgScore">0%</h2>
        </div>
        <div class="stat-card">
            <small>Fraud Rings Blocked</small>
            <h2 style="color: var(--red)" id="fraudCount">0</h2>
        </div>
        <div class="stat-card">
            <small>Network Health</small>
            <h2 style="color: var(--green)">99.9%</h2>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>BVN / Identity</th>
                    <th>Verdict</th>
                    <th>Trust Score</th>
                    <th>Reasoning</th>
                    <th>Squad Status</th>
                </tr>
            </thead>
            <tbody id="logBody">
                <!-- Rows injected here -->
            </tbody>
        </table>
        <div id="emptyState" class="empty">No verification history found.</div>
    </div>

    <script>
        const API = window.location.origin;

        async function fetchLogs() {
            try {
                const r = await fetch(`${API}/api/logs`);
                const data = await r.json();
                renderLogs(data.logs);
            } catch (e) {
                console.error("Failed to fetch logs", e);
            }
        }

        function renderLogs(logs) {
            const body = document.getElementById("logBody");
            const empty = document.getElementById("emptyState");
            
            if (!logs || logs.length === 0) {
                body.innerHTML = "";
                empty.style.display = "block";
                return;
            }

            empty.style.display = "none";
            body.innerHTML = logs.map(l => {
                const date = new Date(l.timestamp).toLocaleTimeString();
                const vClass = `v-${l.verdict.toLowerCase()}`;
                const squad = l.verdict === 'PASS' ? '✅ DISBURSED' : '🛡️ BLOCKED';
                
                return `
                    <tr>
                        <td>${date}</td>
                        <td>${l.bvn.substring(0, 4)}...${l.bvn.substring(7)}</td>
                        <td class="${vClass}">${l.verdict}</td>
                        <td><span class="score-pill">${Math.round(l.trust_score)}%</span></td>
                        <td style="font-size: 12px; color: var(--text-dim)">${l.reason || 'AI Analysis Complete'}</td>
                        <td style="font-size: 12px;">${squad}</td>
                    </tr>
                `;
            }).join("");

            // Update Stats
            document.getElementById("totalCount").innerText = logs.length;
            const avg = logs.reduce((acc, curr) => acc + curr.trust_score, 0) / logs.length;
            document.getElementById("avgScore").innerText = Math.round(avg || 0) + "%";
            document.getElementById("fraudCount").innerText = logs.filter(l => l.verdict === 'BLOCK').length;
        }

        // Auto-refresh every 5 seconds
        setInterval(fetchLogs, 5000);
        fetchLogs();
    </script>
</body>
</html>
